<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; }
    .badge-label { font-size: 13px; font-weight: 600; }
    .desc { font-size: 12px; fill: #6B645A; }
    .card-bg { fill: #F4EEE3; stroke: #D9D2C4; }
  </style>

  <rect width="800" height="320" fill="#FBF7F1"/>
  <text x="24" y="34" class="title" fill="#2A2823">Fit badges + warning callouts</text>
  <text x="24" y="54" class="desc">Color is paired with an icon and label. Color alone never carries meaning.</text>

  <!-- Great -->
  <g transform="translate(24,80)">
    <rect width="180" height="64" rx="8" class="card-bg"/>
    <circle cx="28" cy="32" r="14" fill="#3F7D44"/>
    <path d="M22 32 l4 4 l8 -8" fill="none" stroke="#FBF7F1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="52" y="30" class="badge-label" fill="#2A2823">Great fit</text>
    <text x="52" y="48" class="desc">Recommended</text>
  </g>

  <!-- Decent -->
  <g transform="translate(212,80)">
    <rect width="180" height="64" rx="8" class="card-bg"/>
    <circle cx="28" cy="32" r="14" fill="#C68A3F"/>
    <text x="28" y="38" font-size="18" font-weight="700" fill="#FBF7F1" text-anchor="middle">i</text>
    <text x="52" y="30" class="badge-label" fill="#2A2823">Decent fit</text>
    <text x="52" y="48" class="desc">Allowed, with caveats</text>
  </g>

  <!-- Stretch -->
  <g transform="translate(400,80)">
    <rect width="180" height="64" rx="8" class="card-bg"/>
    <path d="M28 18 l13 22 h-26 z" fill="#D67635"/>
    <text x="28" y="38" font-size="14" font-weight="700" fill="#FBF7F1" text-anchor="middle">!</text>
    <text x="52" y="30" class="badge-label" fill="#2A2823">Stretch fit</text>
    <text x="52" y="48" class="desc">Possible but hard</text>
  </g>

  <!-- Impossible -->
  <g transform="translate(588,80)">
    <rect width="188" height="64" rx="8" class="card-bg"/>
    <circle cx="28" cy="32" r="14" fill="#B0463C"/>
    <path d="M22 26 l12 12 M34 26 l-12 12" stroke="#FBF7F1" stroke-width="2.5" stroke-linecap="round"/>
    <text x="52" y="30" class="badge-label" fill="#2A2823">Impossible</text>
    <text x="52" y="48" class="desc">Won't grow here</text>
  </g>

  <!-- Companion warning -->
  <g transform="translate(24,176)">
    <rect width="370" height="64" rx="8" class="card-bg"/>
    <text x="16" y="28" font-size="20">⚠️</text>
    <text x="48" y="30" class="badge-label" fill="#2A2823">Companion warning</text>
    <text x="48" y="48" class="desc">Basil + fennel — usually unhappy together</text>
  </g>

  <!-- Rotation warning -->
  <g transform="translate(404,176)">
    <rect width="372" height="64" rx="8" class="card-bg"/>
    <text x="16" y="28" font-size="20">🔁</text>
    <text x="48" y="30" class="badge-label" fill="#2A2823">Crop rotation</text>
    <text x="48" y="48" class="desc">Same family was here in 2025 — try another bed</text>
  </g>

  <!-- Invasive gate -->
  <g transform="translate(24,256)">
    <rect width="752" height="48" rx="8" fill="#FCE8E5" stroke="#B0463C"/>
    <circle cx="28" cy="24" r="12" fill="#B0463C"/>
    <text x="28" y="29" font-size="14" font-weight="700" fill="#FBF7F1" text-anchor="middle">!</text>
    <text x="52" y="22" class="badge-label" fill="#B0463C">Invasive in your region</text>
    <text x="52" y="38" class="desc">Type INVASIVE to confirm — this plant can harm local ecosystems</text>
  </g>
</svg>
