<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; }
    .name  { font-size: 13px; font-weight: 600; }
    .desc  { font-size: 11px; fill: #6B645A; }
  </style>

  <rect width="800" height="280" fill="#FBF7F1"/>
  <text x="24" y="34" class="title" fill="#2A2823">Sun-zone overlay washes</text>
  <text x="24" y="54" class="desc">Translucent washes layered over the canvas. Faint enough not to fight surfaces and plants for attention.</text>

  <!-- Full sun -->
  <g transform="translate(24,80)">
    <!-- canvas-like background showing through -->
    <rect width="160" height="120" rx="8" fill="#F4EEE3" stroke="#D9D2C4"/>
    <rect width="160" height="120" rx="8" fill="#E8B23E" opacity="0.18"/>
    <circle cx="32" cy="32" r="12" fill="#E8B23E"/>
    <text x="32" y="36" font-size="14" text-anchor="middle">☀</text>
    <text x="80" y="160" class="name" fill="#2A2823" text-anchor="middle">Full sun</text>
    <text x="80" y="176" class="desc" text-anchor="middle">Warm yellow wash</text>
  </g>

  <!-- Partial morning -->
  <g transform="translate(204,80)">
    <rect width="160" height="120" rx="8" fill="#F4EEE3" stroke="#D9D2C4"/>
    <defs>
      <linearGradient id="amWash" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FCDF8E" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#FCDF8E" stop-opacity="0.10"/>
      </linearGradient>
    </defs>
    <rect width="160" height="120" rx="8" fill="url(#amWash)"/>
    <text x="14" y="34" font-size="13" font-weight="600" fill="#A87520">AM</text>
    <text x="80" y="160" class="name" fill="#2A2823" text-anchor="middle">Partial morning</text>
    <text x="80" y="176" class="desc" text-anchor="middle">Cooler yellow, dawn hint</text>
  </g>

  <!-- Partial afternoon -->
  <g transform="translate(384,80)">
    <rect width="160" height="120" rx="8" fill="#F4EEE3" stroke="#D9D2C4"/>
    <defs>
      <linearGradient id="pmWash" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#F2A85F" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#F2A85F" stop-opacity="0.30"/>
      </linearGradient>
    </defs>
    <rect width="160" height="120" rx="8" fill="url(#pmWash)"/>
    <text x="146" y="34" font-size="13" font-weight="600" fill="#9C5A1F" text-anchor="end">PM</text>
    <text x="80" y="160" class="name" fill="#2A2823" text-anchor="middle">Partial afternoon</text>
    <text x="80" y="176" class="desc" text-anchor="middle">Warmer orange, dusk hint</text>
  </g>

  <!-- Shade -->
  <g transform="translate(564,80)">
    <rect width="160" height="120" rx="8" fill="#F4EEE3" stroke="#D9D2C4"/>
    <rect width="160" height="120" rx="8" fill="#7FA3B5" opacity="0.22"/>
    <circle cx="32" cy="32" r="12" fill="#7FA3B5" opacity="0.6"/>
    <text x="32" y="36" font-size="12" text-anchor="middle" fill="#FBF7F1">☁</text>
    <text x="80" y="160" class="name" fill="#2A2823" text-anchor="middle">Shade</text>
    <text x="80" y="176" class="desc" text-anchor="middle">Cool blue-gray wash</text>
  </g>

  <!-- Note -->
  <text x="24" y="240" class="desc" fill="#6B645A">When zones overlap, the most restrictive level wins (full → partial → shade).</text>
  <text x="24" y="256" class="desc" fill="#6B645A">A toolbar toggle hides these washes when the user is focused on plant placement.</text>
</svg>
