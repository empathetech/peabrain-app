<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <style>
    .title { font-family: 'Atkinson Hyperlegible', 'Inter', system-ui, sans-serif; font-size: 18px; font-weight: 700; }
    .meta  { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; font-size: 11px; fill: #6B645A; }
    .desc  { font-family: 'Atkinson Hyperlegible', 'Inter', system-ui, sans-serif; font-size: 12px; fill: #6B645A; }
    .ui    { font-family: 'Atkinson Hyperlegible', 'Inter', system-ui, sans-serif; }
    .mono  { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; }
  </style>

  <rect width="800" height="460" fill="#FBF7F1"/>
  <text x="24" y="34" class="title" fill="#2A2823">Typography specimen</text>
  <text x="24" y="54" class="desc">Renders in your installed font (Atkinson Hyperlegible or Inter preferred). Falls back to system sans where unavailable. Mono is JetBrains Mono / IBM Plex Mono / system mono.</text>

  <text x="24" y="92" class="meta">UI · DISPLAY (32 / 700)</text>
  <text x="24" y="124" class="ui" font-size="32" font-weight="700" fill="#2A2823">Plan a garden you'll actually grow.</text>

  <text x="24" y="166" class="meta">UI · HEADING (22 / 700)</text>
  <text x="24" y="194" class="ui" font-size="22" font-weight="700" fill="#2A2823">Recommendations for Bed A</text>

  <text x="24" y="232" class="meta">UI · SUBHEADING (16 / 600)</text>
  <text x="24" y="256" class="ui" font-size="16" font-weight="600" fill="#2A2823">Cherry tomato — great fit for your zone</text>

  <text x="24" y="294" class="meta">UI · BODY (16 / 400)</text>
  <text x="24" y="318" class="ui" font-size="16" font-weight="400" fill="#2A2823">Plant 2–4 weeks after your last spring frost (± 14 days at your location).</text>

  <text x="24" y="356" class="meta">UI · CAPTION (13 / 500)</text>
  <text x="24" y="378" class="ui" font-size="13" font-weight="500" fill="#6B645A">Last edited a moment ago</text>

  <text x="24" y="412" class="meta">MONO · NUMERICS (13 / 500)</text>
  <text x="24" y="434" class="mono" font-size="13" font-weight="500" fill="#2A2823">2.4 × 1.2 m  ·  depth 30 cm  ·  approx. 60–80 days  ·  ~8–12 kg</text>
</svg>
