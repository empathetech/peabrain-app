<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .title { font-size: 18px; font-weight: 700; }
    .name  { font-size: 15px; font-weight: 600; }
    .meta  { font-family: ui-monospace, 'JetBrains Mono', Menlo, monospace; font-size: 11px; fill: #6B645A; }
    .desc  { font-size: 12px; fill: #6B645A; }
    .section-title { font-size: 14px; font-weight: 600; }
  </style>

  <rect width="800" height="620" fill="#FBF7F1"/>
  <text x="24" y="34" class="title" fill="#2A2823">Surface visual language</text>
  <text x="24" y="54" class="desc">Each surface type has a distinct treatment so a glance tells you what it is.</text>

  <!-- IN-GROUND PLOT -->
  <g transform="translate(24,90)">
    <text x="0" y="0" class="name" fill="#2A2823">In-ground plot</text>
    <text x="0" y="18" class="desc">Soft, irregular edge. Soil-brown fill. No hard border.</text>
    <g transform="translate(0,32)">
      <path d="M2,40 C2,25 25,18 60,22 C120,12 175,22 230,38 C250,44 258,68 252,98 C246,128 220,140 170,138 C110,136 50,140 28,128 C8,118 0,90 2,40 Z"
            fill="#8B6F4E" stroke="#6B5238" stroke-width="0.5" opacity="0.92"/>
    </g>
    <text x="0" y="200" class="meta" fill="#2A2823">Plot A · 3.0 × 1.5 m</text>
  </g>

  <!-- RAISED BED -->
  <g transform="translate(420,90)">
    <text x="0" y="0" class="name" fill="#2A2823">Raised bed</text>
    <text x="0" y="18" class="desc">Hard rectangle. Wood-tone border. Inset shadow for depth.</text>
    <g transform="translate(0,32)">
      <rect x="2" y="32" width="296" height="116" rx="3" fill="#3F2A1A"/>
      <rect x="8" y="38" width="284" height="104" rx="2" fill="#7A5A3D"/>
      <rect x="14" y="44" width="272" height="92" fill="#5C3A21"/>
    </g>
    <text x="0" y="200" class="meta" fill="#2A2823">Bed A · 2.4 × 1.2 m · depth 30 cm</text>
  </g>

  <!-- PLANTER -->
  <g transform="translate(24,310)">
    <text x="0" y="0" class="name" fill="#2A2823">Planter / pot</text>
    <text x="0" y="18" class="desc">Circle or rounded rectangle. Terracotta-toned border.</text>
    <g transform="translate(0,32)">
      <circle cx="160" cy="90" r="64" fill="#B8643A" stroke="#7A4226" stroke-width="3"/>
      <circle cx="160" cy="90" r="54" fill="#5C3A21"/>
    </g>
    <text x="0" y="200" class="meta" fill="#2A2823">Tomato pot · 40 L · depth 36 cm</text>
  </g>

  <!-- TRELLIS -->
  <g transform="translate(420,310)">
    <text x="0" y="0" class="name" fill="#2A2823">Trellis</text>
    <text x="0" y="18" class="desc">Vertical bar with lattice. The 2.5D surface — has elevation.</text>
    <g transform="translate(0,32)">
      <rect x="120" y="20" width="56" height="156" rx="2" fill="#A0856A" stroke="#5C3A21" stroke-width="1.5"/>
      <line x1="120" y1="40" x2="176" y2="40" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="120" y1="60" x2="176" y2="60" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="120" y1="80" x2="176" y2="80" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="120" y1="100" x2="176" y2="100" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="120" y1="120" x2="176" y2="120" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="120" y1="140" x2="176" y2="140" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="120" y1="160" x2="176" y2="160" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="134" y1="20" x2="134" y2="176" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="148" y1="20" x2="148" y2="176" stroke="#5C3A21" stroke-width="0.8"/>
      <line x1="162" y1="20" x2="162" y2="176" stroke="#5C3A21" stroke-width="0.8"/>
      <circle cx="216" cy="32" r="14" fill="#FBF7F1" stroke="#6B645A" stroke-width="1.2"/>
      <text x="216" y="37" font-size="14" font-weight="600" fill="#6B645A" text-anchor="middle">↑</text>
    </g>
    <text x="0" y="200" class="meta" fill="#2A2823">Trellis A · 1.8 m tall · faces SW</text>
  </g>

  <!-- Status pills -->
  <text x="24" y="540" class="section-title" fill="#2A2823">Surface build status</text>
  <text x="24" y="558" class="desc">Only shown when buildOrBuy ≠ "existing".</text>

  <g transform="translate(24,572)">
    <rect width="240" height="34" rx="6" fill="#F4EEE3" stroke="#D9D2C4"/>
    <rect x="10" y="8" width="64" height="18" rx="9" fill="#FBF7F1" stroke="#C68A3F" stroke-dasharray="3 2"/>
    <text x="42" y="21" font-size="10" font-weight="600" fill="#C68A3F" text-anchor="middle">PLANNED</text>
    <text x="84" y="22" class="meta" fill="#2A2823">Bed B — to build</text>
  </g>

  <g transform="translate(280,572)">
    <rect width="240" height="34" rx="6" fill="#F4EEE3" stroke="#D9D2C4"/>
    <rect x="10" y="8" width="80" height="18" rx="9" fill="#E8B23E"/>
    <text x="50" y="21" font-size="10" font-weight="600" fill="#2A2823" text-anchor="middle">IN-PROGRESS</text>
    <text x="100" y="22" class="meta" fill="#2A2823">Bed B — building</text>
  </g>

  <g transform="translate(536,572)">
    <rect width="240" height="34" rx="6" fill="#F4EEE3" stroke="#D9D2C4"/>
    <rect x="10" y="8" width="50" height="18" rx="9" fill="#3F7D44"/>
    <text x="35" y="21" font-size="10" font-weight="600" fill="#FBF7F1" text-anchor="middle">READY</text>
    <text x="70" y="22" class="meta" fill="#2A2823">Bed B — ready to plant</text>
  </g>
</svg>
